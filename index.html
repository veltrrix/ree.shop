<style>
  :root{
    --ink:#080A16;
    --card:#0F1226;
    --card-hi:#151934;
    --border:rgba(255,255,255,.08);
    --red:#FF3B57;
    --red-deep:#D91E42;
    --blue:#229ED9;
    --blue-deep:#0B7FBF;
    --gold:#FFC24B;
    --violet:#8B5CF6;
    --text-dim:rgba(255,255,255,.64);
    --text-faint:rgba(255,255,255,.38);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    min-height:100vh; min-height:100dvh;
    background:
      radial-gradient(circle at 18% 15%, rgba(139,92,246,.22) 0%, transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(34,158,217,.18) 0%, transparent 45%),
      radial-gradient(circle at 75% 90%, rgba(255,59,87,.14) 0%, transparent 45%),
      radial-gradient(circle at 10% 85%, rgba(255,194,75,.10) 0%, transparent 40%),
      var(--ink);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:28px 14px;
  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }

  /* ============ CARD ============ */
  .frame{
    position:relative; max-width:432px; width:100%;
    border-radius:34px; padding:1.5px;
    background:linear-gradient(160deg, rgba(139,92,246,.55), rgba(34,158,217,.35) 35%, rgba(255,59,87,.4) 70%, rgba(255,194,75,.5));
    box-shadow:0 40px 90px rgba(0,0,0,.6);
    animation:cardIn .7s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(24px) scale(.97);} to{ opacity:1; transform:none;} }

  .card{
    position:relative;
    border-radius:32.5px;
    background:linear-gradient(180deg, var(--card-hi) 0%, var(--card) 60%);
    padding:42px 30px 32px;
    text-align:center;
    overflow:hidden;
    isolation:isolate;
  }

  /* subtle noise / vignette for depth */
  .card::before{
    content:""; position:absolute; inset:0; z-index:0;
    background:radial-gradient(ellipse at 50% -10%, rgba(255,255,255,.06), transparent 55%);
    pointer-events:none;
  }

  .glow{
    position:absolute; top:-140px; left:50%; transform:translateX(-50%);
    width:360px; height:360px; border-radius:50%; z-index:0;
    background:conic-gradient(from 0deg, var(--violet), var(--blue), var(--gold), var(--red), var(--violet));
    filter:blur(75px); opacity:.32;
    animation:spin 16s linear infinite;
  }
  @keyframes spin{ to{ transform:translateX(-50%) rotate(360deg); } }

  /* ===== AVATAR ===== */
  .avatar-wrap{ position:relative; width:128px; height:128px; margin:0 auto 22px; z-index:1; }
  .avatar-ring{
    position:absolute; inset:-5px; border-radius:50%;
    background:conic-gradient(var(--violet), var(--blue), var(--gold), var(--red), var(--violet));
    animation:spin 7s linear infinite;
  }
  .avatar-ring::after{ content:""; position:absolute; inset:4px; border-radius:50%; background:var(--card); }
  .avatar{
    position:absolute; inset:7px; border-radius:50%; overflow:hidden;
    box-shadow:0 14px 32px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;
    animation:float 4.5s ease-in-out infinite;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
  @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }

  .live-dot{
    position:absolute; bottom:4px; right:4px; width:24px; height:24px;
    background:#22C55E; border:3px solid var(--card); border-radius:50%;
    box-shadow:0 0 0 0 rgba(34,197,94,.6);
    animation:pulseDot 2s ease-out infinite;
    display:flex; align-items:center; justify-content:center;
  }
  .live-dot::after{ content:""; width:6px; height:6px; border-radius:50%; background:#fff; }
  @keyframes pulseDot{
    0%{ box-shadow:0 0 0 0 rgba(34,197,94,.55); }
    70%{ box-shadow:0 0 0 11px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }

  /* ===== NAME ===== */
  .name{
    position:relative; z-index:1;
    font-family:'Fraunces', serif; font-weight:800; font-optical-sizing:auto;
    font-size:clamp(1.8rem, 7.5vw, 2.35rem); color:#fff; letter-spacing:-.3px;
    line-height:1.12;
    display:inline-flex; align-items:center; gap:8px;
  }
  .verified{ width:22px; height:22px; flex-shrink:0; }

  .badge-row{
    position:relative; z-index:1;
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:12px; flex-wrap:wrap;
  }
  .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:.74rem; font-weight:700; letter-spacing:.02em;
    color:#FFD98A; background:rgba(255,194,75,.12);
    border:1px solid rgba(255,194,75,.28);
    padding:5px 12px 5px 10px; border-radius:100px;
  }
  .badge.blue{ color:#8FE0FF; background:rgba(34,158,217,.14); border-color:rgba(34,158,217,.32); }
  .badge svg{ width:13px; height:13px; }

  .desc{
    position:relative; z-index:1;
    margin-top:18px; font-size:1rem; line-height:1.65; font-weight:400;
    color:var(--text-dim); max-width:31ch; margin-left:auto; margin-right:auto;
  }
  .desc strong{
    color:#fff; font-weight:700;
    background:linear-gradient(120deg, rgba(255,194,75,.35), rgba(255,194,75,0) 70%);
    padding:0 3px; border-radius:3px;
  }

  .hr{
    position:relative; z-index:1; height:1px; margin:24px 0 22px;
    background:linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }

  /* ===== BUTTONS ===== */
  .buttons{ position:relative; z-index:1; display:flex; flex-direction:column; gap:13px; }

  .btn{
    position:relative; display:flex; align-items:center; justify-content:center;
    gap:11px; width:100%; padding:16px 20px; border-radius:16px;
    font-family:'Inter', sans-serif; font-weight:700; font-size:1.02rem;
    letter-spacing:.01em; text-decoration:none; cursor:pointer;
    border:1px solid transparent; overflow:hidden; -webkit-tap-highlight-color:transparent;
    transition:transform .35s cubic-bezier(.25,.46,.45,.94), box-shadow .35s ease, filter .35s ease;
  }
  .btn .tg-icon{ width:22px; height:22px; flex-shrink:0; filter:drop-shadow(0 1px 2px rgba(0,0,0,.2)); }
  .btn:active{ transform:scale(.96) !important; }

  .btn-red{
    color:#fff;
    background:linear-gradient(120deg, var(--red-deep) 0%, var(--red) 40%, #FF7A6B 70%, var(--red) 100%);
    background-size:220% 220%;
    animation:gradientMove 4.5s ease infinite;
    box-shadow:0 16px 36px rgba(217,30,66,.42), 0 2px 0 rgba(255,255,255,.15) inset;
  }
  .btn-blue{
    color:#fff;
    background:linear-gradient(120deg, var(--blue-deep) 0%, var(--blue) 40%, #5FD4FF 70%, var(--blue) 100%);
    background-size:220% 220%;
    animation:gradientMove 4.5s ease infinite;
    box-shadow:0 16px 36px rgba(11,127,191,.42), 0 2px 0 rgba(255,255,255,.15) inset;
  }
  @keyframes gradientMove{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }

  .btn::before{
    content:""; position:absolute; top:0; left:-130%; width:65%; height:100%;
    background:linear-gradient(115deg, transparent, rgba(255,255,255,.4), transparent);
    transform:skewX(-20deg); animation:shimmer 3s ease-in-out infinite;
    z-index:1;
  }
  .btn-blue::before{ animation-delay:.5s; }
  @keyframes shimmer{ 0%{ left:-130%; } 45%,100%{ left:140%; } }

  .btn span, .btn svg{ position:relative; z-index:2; }

  .btn-red:hover{ transform:translateY(-3px); box-shadow:0 24px 46px rgba(217,30,66,.52), 0 2px 0 rgba(255,255,255,.2) inset; filter:brightness(1.05); }
  .btn-blue:hover{ transform:translateY(-3px); box-shadow:0 24px 46px rgba(11,127,191,.52), 0 2px 0 rgba(255,255,255,.2) inset; filter:brightness(1.05); }

  .fineprint{

  }
  .fineprint .dot{ width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,.22); }
</style>
